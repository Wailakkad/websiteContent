<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Content Portal - Collect Client Assets</title>
    <meta name="description" content="Stop chasing clients for website content. Collect logos, copy, contact info, and website details in one clean, professional client portal." />
    <meta name="theme-color" content="#4f46e5" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.yourdomain.com/" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Content Portal" />
    <meta property="og:url" content="https://www.yourdomain.com/" />
    <meta property="og:title" content="Content Portal - Collect Client Assets" />
    <meta property="og:description" content="Stop chasing clients for website content. Collect logos, copy, contact info, and website details in one clean, professional client portal." />
    <meta property="og:image" content="https://www.yourdomain.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.yourdomain.com/" />
    <meta name="twitter:title" content="Content Portal - Collect Client Assets" />
    <meta name="twitter:description" content="Stop chasing clients for website content. Collect logos, copy, contact info, and website details in one clean, professional client portal." />
    <meta name="twitter:image" content="https://www.yourdomain.com/og-image.jpg" />

    <!-- Preconnect Hints for External Assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Uncomment if deploying to supabase: <link rel="preconnect" href="https://your-project.supabase.co" /> -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Built-in JSON-LD Structured Data for the App -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Content Portal",
      "description": "A professional client onboarding and content collection platform for agencies and freelancers.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "All",
      "url": "https://www.yourdomain.com",
      "author": {
        "@type": "Organization",
        "name": "Content Portal Inc."
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "124"
      }
    }
    </script>
  </head>
  <body class="antialiased text-gray-900 selection:bg-indigo-100 selection:text-indigo-900 bg-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
